      <path d="M300,55 L318,55 L322,47 L326,55 L350,55 L354,63 L358,55 L390,55 L394,17 L400,93 L406,55 L450,55 L454,49 L458,55 L490,55 L494,65 L498,55 L530,55 L534,25 L540,55 L600,55"
